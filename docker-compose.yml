services:
  # ─── App server ────────────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://tuify:${DB_PASS:-tuifydev}@postgres:5432/tuify
      - REDIS_URL=redis://redis:6379
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
      - STORAGE_PATH=/data/uploads
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL:-}
      - AWS_BUCKET=${AWS_BUCKET:-tuify-assets}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - CDN_BASE_URL=${CDN_BASE_URL:-http://localhost:3002/uploads}
      - CORS_ORIGINS=https://tuify.app,http://localhost:3001
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tuify
      POSTGRES_USER: tuify
      POSTGRES_PASSWORD: ${DB_PASS:-tuifydev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"       # exposed for local access / migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuify"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"       # exposed for local access

volumes:
  pgdata:
  redisdata:
  uploads:
